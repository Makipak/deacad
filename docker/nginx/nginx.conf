# Reverse proxy sederhana: domain utama -> web (Next.js), /api -> api (NestJS).
# TLS/Certbot sengaja tidak dikonfigurasi di sini — dijalankan terpisah di host (ARCHITECTURE.md #2).

events {
  worker_connections 1024;
}

http {
  upstream web_upstream {
    server web:3000;
  }

  upstream api_upstream {
    server api:4000;
  }

  server {
    listen 80;
    server_name _;

    # Ukuran body dinaikkan — upload dokumen PDF/PPTX bisa cukup besar.
    client_max_body_size 55m;

    location /api/ {
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://web_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
